name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - feature/**
  pull_request:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read

# Global env: force GitHub Actions to use Node 24 for JS actions
# This removes the Node 20 deprecation warning and keeps runs green going forward.
env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: full
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build, lint, and test
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Show Rust version
        run: rustc -V && cargo -V

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.rust }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.rust }}-
            ${{ runner.os }}-cargo-

      - name: Install Rust components
        run: |
          rustup component add clippy rustfmt || echo "Optional components not available for this toolchain"

      - name: Check formatting
        run: |
          if ls **/Cargo.toml >/dev/null 2>&1; then
            cargo fmt --all -- --check
          else
            echo "No Rust workspace found for rustfmt."
          fi

      - name: Run clippy lints
        run: |
          if ls **/Cargo.toml >/dev/null 2>&1; then
            cargo clippy --all-targets --all-features -- -D warnings
          else
            echo "No Rust workspace found for clippy."
          fi

      - name: Build Rust project
        run: |
          if ls **/Cargo.toml >/dev/null 2>&1; then
            cargo build --all --all-targets --verbose
          else
            echo "No Rust workspace found to build."
          fi

      - name: Run tests
        run: |
          if ls **/Cargo.toml >/dev/null 2>&1; then
            # Run tests; if there truly are none, exit 0 instead of failing CI
            if cargo test --all --all-targets --verbose; then
              echo "Tests completed successfully."
            else
              echo "Tests failed. Fix tests or adjust CI expectations if failures are intentional."
              exit 1
            fi
          else
            echo "No Rust workspace found to test."
          fi

  check-space-config:
    name: Validate Space configuration
    runs-on: ubuntu-latest
    needs: build-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Space instructions presence
        run: |
          if [ -f "create-space-instructions-for-clHtK9rORM6UD5VbrpNZMA.md" ]; then
            echo "Space instructions file found."
          else
            echo "Missing create-space-instructions file required for Perplexity Spaces."
            # Keep this a hard failure because the file is required.
            exit 1
          fi

      - name: Basic YAML lint for workflows
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: .github/workflows
          format: github
        env:
          YAMLLINT_CONFIG_FILE: .yamllint.yml
