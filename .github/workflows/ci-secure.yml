name: CI Secure

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  build-and-audit:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Verify crate checksums against config/crate-integrity.toml
        run: |
          if [ -f config/crate-integrity.toml ]; then
            echo "Verifying crate checksums using config/crate-integrity.toml"
            cargo run --quiet --bin crate-integrity-checker -- config/crate-integrity.toml || {
              echo "Crate integrity check failed"
              exit 1
            }
          else
            echo "config/crate-integrity.toml not found; skipping checksum verification"
          fi

      - name: Build scripts audit (no network, no secret access)
        run: |
          echo "Scanning build.rs and .cargo/config* for suspicious patterns..."
          mapfile -t BUILD_SCRIPTS < <(find . -name "build.rs")

          for f in "${BUILD_SCRIPTS[@]}"; do
            echo "Checking $f"
            if grep -E "reqwest|curl|ureq|hyper" "$f"; then
              echo "ERROR: Network-related crate usage found in build script: $f"
              exit 1
            fi
            if grep -E "env::var|std::env::vars" "$f"; then
              echo "WARNING: build script reads environment variables: $f"
            fi
          done

      - name: Cargo check (no default features, no tests)
        env:
          GITHUB_TOKEN: ""
        run: |
          cargo check --all --all-targets

      - name: Build script audit summary
        run: |
          echo "Build script auditing completed."
